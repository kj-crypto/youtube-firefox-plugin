<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="menu.css" />
  </head>
  <body>
    <div class="plugin-body">
      <div class="menu">
        <div class="toggle-container">
          <label class="toggle-switch">
            <input type="checkbox" id="toggle" />
            <span class="slider"></span>
          </label>
          <span class="toggle-text">Off</span>
        </div>

        <div class="playlist-controls" id="playlist-controls">
          <div class="input-row">
            <input type="text" id="playlist-name" placeholder="Playlist name" />
            <button id="new-playlist" title="Create new playlist">New</button>
          </div>

          <div class="load-row">
            <select id="playlist-select" title="Select playlist to load">
              <option value="">Select playlist...</option>
            </select>
            <button id="load-playlist" title="Load selected playlist">Load</button>
          </div>
        </div>
        <div class="button-row">
          <button id="show">Show</button>
          <button id="dump">Dump</button>
        </div>
      </div>
    </div>

    <script type="module" src="menu.js"></script>
  </body>
</html>
